name: Deploy Jekyll to FTP and GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Jekyll dependencies
        # This safely checks if you use a Gemfile or just vanilla Jekyll
        run: |
          gem install jekyll bundler
          if [ -f Gemfile ]; then bundle install; fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # --- 1. BUILD & DEPLOY FOR FTP ---
      - name: Create FTP Config Override
        # Added the pipe (|) below to fix the YAML colon parsing error
        run: |
          echo -e 'url: "http://sceneserver.net"\nbaseurl: ""' > _config_ftp.yml

      - name: Build for FTP
        run: |
          if [ -f Gemfile ]; then
            JEKYLL_ENV=production bundle exec jekyll build --config _config.yml,_config_ftp.yml --destination ./_site_ftp
          else
            JEKYLL_ENV=production jekyll build --config _config.yml,_config_ftp.yml --destination ./_site_ftp
          fi

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./_site_ftp/
          server-dir: /sceneserver/stevenmatisoncom/
          protocol: ftp

      # --- 2. BUILD & DEPLOY FOR GITHUB PAGES ---
      - name: Create GitHub Pages Config Override
        # Added the pipe (|) below to fix the YAML colon parsing error
        run: |
          echo -e 'url: "https://cldr-steven-matison.github.io"\nbaseurl: ""' > _config_gh.yml

      - name: Build for GitHub Pages
        run: |
          if [ -f Gemfile ]; then
            JEKYLL_ENV=production bundle exec jekyll build --config _config.yml,_config_gh.yml --destination ./_site_gh
          else
            JEKYLL_ENV=production jekyll build --config _config.yml,_config_gh.yml --destination ./_site_gh
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site_gh

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4