name: Update Repo List
on:
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight
  workflow_dispatch:      # Allows you to run it manually

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fetch Repositories
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          response=$(curl -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/users/cldr-steven-matison/repos?sort=updated&direction=desc&per_page=100")

          # Fail loudly if the API returned an error object instead of an array
          if ! echo "$response" | jq -e 'type == "array"' >/dev/null; then
            echo "GitHub API did not return an array. Response:"
            echo "$response"
            exit 1
          fi

          echo "$response" | jq -r '.[] | "- name: \"\(.name)\"\n  description: \"\(.description // "")\"\n  url: \"\(.html_url)\"\n  size: \(.size)\n  lang: \"\(.language // "")\"\n  updated: \"\(.updated_at | split("T")[0])\"\n  fork: \(.fork)"' > _data/repos.yml

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/repos.yml
          git commit -m "Automated repo list update (including forks)" || exit 0
          git push
