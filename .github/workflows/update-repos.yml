name: Update Repo List
on:
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight
  workflow_dispatch:      # Allows you to run it manually to test

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Repositories
        run: |
          # Fetches your public repos and formats them into YAML
          # Replace the curl/jq line in your workflow with this:
          curl -s "https://api.github.com/users/cldr-steven-matison/repos?sort=updated" | \
          jq -r '.[] | select(.fork == false) | "- name: \"\(.name)\"\n  description: \"\(.description // "No description")\"\n  url: \"\(.html_url)\"\n  size: \(.size)\n  lang: \"\(.language // "Misc")\""' > _data/repos.yml
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/repos.yml
          git commit -m "Automated repo list update" || exit 0
          git push
