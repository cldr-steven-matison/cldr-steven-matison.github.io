name: Update Repo List
on:
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight
  workflow_dispatch:      # Allows you to run it manually

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Repositories
        run: |
          curl -s "https://api.github.com/users/cldr-steven-matison/repos?sort=updated" | \
          jq -r '.[] | select(.fork == false) | "- name: \"\(.name)\"\n  description: \"\(.description // "")\"\n  url: \"\(.html_url)\"\n  size: \(.size)\n  lang: \"\(.language // "")\"\n  updated: \"\(.updated_at | split(\"T\")[0])\""' > _data/repos.yml

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/repos.yml
          git commit -m "Automated repo list update" || exit 0
          git push
